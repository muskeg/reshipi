site_name: レシピ
site_description: Une collection de recettes multilingue
site_url: https://muskeg.github.io/reshipi/

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.png
  favicon: assets/favicon.ico
  palette:
    scheme: slate
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - content.tabs.link
    - header.autohide

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/conversions.js
  - javascripts/filter.js

hooks:
  - hooks/conversions.py

plugins:
  - search
  - tags:
      listings_map:
        tags.md: {}
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: fr
          default: true
          name: Français
          build: true
        - locale: en
          name: Original
          build: true
          nav_translations:
            Accueil: Home
            Recettes: Recipes
        - locale: ja
          name: 日本語
          build: true
          nav_translations:
            Accueil: ホーム
            Recettes: レシピ

nav:
  - Accueil: index.md
  - Tags: tags.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
